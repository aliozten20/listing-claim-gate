# Render Blueprint — provisions the Go web service + a managed Postgres.
# Deploy via the Render MCP or the dashboard ("New +" → "Blueprint").

databases:
  - name: llm-monitoring-db
    databaseName: llm_monitoring
    user: llm
    plan: free

services:
  - type: web
    name: llm-monitoring-api
    runtime: go
    plan: free
    # Monorepo: this service lives in the backend/ subdirectory.
    rootDir: backend
    buildCommand: go build -o app ./cmd/server
    startCommand: ./app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: llm-monitoring-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 168h
      # Set to your Vercel frontend origin after first FE deploy (no trailing slash).
      - key: CORS_ORIGINS
        sync: false
      - key: APP_NAME
        value: LLM Monitoring & Deci.Scoring
      - key: APP_VERSION
        value: "0.1.0"
