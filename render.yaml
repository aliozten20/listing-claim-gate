# Render Blueprint — Listing & Claim Gate
# API + free Postgres + Prometheus + Grafana (prod observability)

databases:
  - name: listing-claim-gate-db
    databaseName: listing_claim_gate
    user: listing
    plan: free

services:
  - type: web
    name: listing-claim-gate-api
    runtime: go
    plan: free
    rootDir: backend
    buildCommand: go build -o app ./cmd/server
    startCommand: ./app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: listing-claim-gate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 168h
      - key: CORS_ORIGINS
        value: https://listing-claim-gate.vercel.app
      - key: APP_NAME
        value: Listing & Claim Gate
      - key: APP_VERSION
        value: "0.1.0"
      - key: MAX_CONCURRENT_INFERENCES
        value: "20"
      - key: REQUEST_TIMEOUT
        value: 15s
      # Local worker tunnel hostname (Cloudflare). Leave empty for rules-only Gate.
      - key: MLC_BASE_URL
        sync: false

  # Scrapes https://listing-claim-gate-api.onrender.com/metrics
  - type: web
    name: listing-claim-gate-prometheus
    runtime: docker
    plan: free
    dockerfilePath: ./infra/prometheus/Dockerfile
    dockerContext: ./infra/prometheus
    autoDeploy: true
    healthCheckPath: /-/ready

  # Dashboards → Prometheus (Render private DNS)
  - type: web
    name: listing-claim-gate-grafana
    runtime: docker
    plan: free
    dockerfilePath: ./infra/grafana/Dockerfile
    dockerContext: ./infra/grafana
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: PROMETHEUS_URL
        # Public URL works on Render free (no private-network requirement)
        value: https://listing-claim-gate-prometheus.onrender.com
      - key: GF_SECURITY_ADMIN_USER
        value: admin
      - key: GF_SECURITY_ADMIN_PASSWORD
        generateValue: true
      - key: GF_AUTH_ANONYMOUS_ENABLED
        value: "true"
      - key: GF_AUTH_ANONYMOUS_ORG_ROLE
        value: Viewer
      - key: GF_SERVER_ROOT_URL
        value: https://listing-claim-gate-grafana.onrender.com
