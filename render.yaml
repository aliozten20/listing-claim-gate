# Render Blueprint — Listing & Claim Gate API
# Temporary: Render managed Postgres (free). Swap DATABASE_URL to Supabase later.

databases:
  - name: listing-claim-gate-db
    databaseName: listing_claim_gate
    user: listing
    plan: free

services:
  - type: web
    name: listing-claim-gate-api
    runtime: go
    plan: free
    rootDir: backend
    buildCommand: go build -o app ./cmd/server
    startCommand: ./app
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: listing-claim-gate-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: TRUST_PROXY
        value: "true"
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 168h
      # Set after first Vercel deploy (no trailing slash)
      - key: CORS_ORIGINS
        sync: false
      - key: APP_NAME
        value: Listing & Claim Gate
      - key: APP_VERSION
        value: "0.1.0"
      - key: MAX_CONCURRENT_INFERENCES
        value: "20"
      - key: REQUEST_TIMEOUT
        value: 15s
