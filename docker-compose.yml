# Listing & Claim Gate — local stack
# Core:    docker compose up --build -d
# Full:    docker compose --profile full up --build -d   # + Grafana + Prometheus + MLC
# Worker:  docker compose --profile worker up --build -d # MLC + Caddy + cloudflared tunnel
#
# Frontend stays on host: cd frontend && npm run dev
# Worker docs: docs/WORKER.md

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: listing
      POSTGRES_PASSWORD: listing
      POSTGRES_DB: listing_claim_gate
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U listing -d listing_claim_gate"]
      interval: 3s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
      PORT: "8080"
      DATABASE_URL: postgres://listing:listing@postgres:5432/listing_claim_gate?sslmode=disable
      JWT_SECRET: dev-insecure-secret-change-me-but-32b-min!!
      CORS_ORIGINS: http://localhost:3000,https://listing-claim-gate.vercel.app
      TRUST_PROXY: "false"
      REQUEST_TIMEOUT: 15s
      BCRYPT_COST: "12"
      APP_NAME: Listing & Claim Gate
      APP_VERSION: "0.1.0"
      # Host reaches Caddy on :8088 when --profile worker is up; empty disables MLC
      MLC_BASE_URL: ${MLC_BASE_URL:-http://host.docker.internal:8088}
      MAX_CONCURRENT_INFERENCES: "20"
    depends_on:
      postgres:
        condition: service_healthy

  mlc:
    profiles: ["full", "worker"]
    build: ./infra/mlc
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  mlc-proxy:
    profiles: ["worker"]
    image: caddy:2.8-alpine
    ports:
      - "8088:8088"
    volumes:
      - ./infra/worker/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      mlc:
        condition: service_healthy

  tunnel:
    profiles: ["worker"]
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN:-}
    depends_on:
      - mlc-proxy
    restart: unless-stopped

  prometheus:
    profiles: ["full"]
    image: prom/prometheus:v2.54.1
    ports:
      - "9090:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - backend

  grafana:
    profiles: ["full"]
    build:
      context: ./infra/grafana
      dockerfile: Dockerfile
    ports:
      - "3002:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: listing
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_USERS_DEFAULT_THEME: light
      GF_SERVER_ROOT_URL: http://localhost:3002
      PORT: "3000"
      PROMETHEUS_URL: http://prometheus:9090
    depends_on:
      - prometheus
      - backend

volumes:
  pgdata:
